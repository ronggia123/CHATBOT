<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VLU Support Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-window { width: 400px; height: 600px; background: white; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #007bff; color: white; padding: 15px; font-weight: bold; }
        #chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; }
        .msg { margin-bottom: 12px; padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .bot { background: #e9ecef; align-self: flex-start; color: #333; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        /* Style link "Tại đây" màu đỏ gạch chân */
        .link-style { color: #b01116; font-weight: bold; text-decoration: underline; display: block; margin-top: 5px; }
        /* Vùng nút gợi ý */
        #suggestion-area { padding: 10px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; flex-wrap: wrap; }
        .s-btn { border: 1px solid #007bff; color: #007bff; background: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .s-btn:hover { background: #007bff; color: white; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="header"><i class="fas fa-graduation-cap"></i> Hỗ trợ sinh viên VLU</div>
    <div id="chat-content">
        <div class="msg bot">Chào bạn! Chọn chủ đề bên dưới hoặc nhập câu hỏi nhé.</div>
    </div>
    <div id="suggestion-area">
        <button class="s-btn" onclick="quickAction('Đăng ký môn')">Đăng ký môn</button>
        <button class="s-btn" onclick="quickAction('Lịch học')">Lịch học</button>
        <button class="s-btn" onclick="quickAction('Tín chỉ')">Tín chỉ</button>
        <button class="s-btn" onclick="quickAction('Học phí')">Học phí</button>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nhập câu hỏi...">
        <button onclick="sendMsg()" style="background:none; border:none; color:#007bff; cursor:pointer; font-size:20px; margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-content');
    const input = document.getElementById('user-input');

    async function sendMsg() {
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();

            // Hiển thị text kèm link "Tại đây" nếu có
            let botMsg = `<div class="msg bot">${data.text}`;
            if(data.link) {
                botMsg += `<a href="${data.link}" target="_blank" class="link-style">Tại đây</a>`;
            }
            botMsg += `</div>`;
            
            box.innerHTML += botMsg;
            box.scrollTop = box.scrollHeight;
        } catch (e) { console.error(e); }
    }

    function quickAction(phrase) {
        input.value = phrase;
        sendMsg();
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
